name: Update Bracket Data

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Optional season year (example: 2026)"
        required: false
        type: string
      simulations:
        description: "Optional simulation count"
        required: false
        type: string
      skip_public_fetch:
        description: "Skip ESPN fetch and require cached bracket.csv"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "15 */6 * 3-4 *"

permissions:
  contents: write

concurrency:
  group: bracket-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bracket pipeline
        shell: bash
        env:
          INPUT_SEASON: ${{ github.event.inputs.season }}
          INPUT_SIMULATIONS: ${{ github.event.inputs.simulations }}
          INPUT_SKIP_PUBLIC_FETCH: ${{ github.event.inputs.skip_public_fetch }}
        run: |
          set -euo pipefail
          args=(scripts/update_bracket_site.py --write-bracket-cache)

          if [[ -n "${INPUT_SEASON}" ]]; then
            args+=(--season "${INPUT_SEASON}")
          fi

          if [[ -n "${INPUT_SIMULATIONS}" ]]; then
            args+=(--simulations "${INPUT_SIMULATIONS}")
          fi

          if [[ "${INPUT_SKIP_PUBLIC_FETCH}" == "true" ]]; then
            args+=(--skip-public-fetch)
          fi

          python "${args[@]}"

      - name: Commit and push updates
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A docs/data

          if [[ -d data/generated ]]; then
            git add -A data/generated
          fi

          shopt -s nullglob
          for cache_file in data/raw/*/bracket.csv; do
            git add "${cache_file}"
          done
          shopt -u nullglob

          if git diff --cached --quiet; then
            echo "No data changes detected."
            exit 0
          fi

          git commit -m "chore: refresh bracket site data"
          git push
