<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dbontr bracket oracle</title>
  <meta http-equiv="refresh" content="0; url=./docs/" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f3eee4;
      --text: #2f281d;
      --muted: #73644d;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "IBM Plex Sans", "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      text-align: center;
      padding: 20px;
    }
    a {
      color: inherit;
    }
    p {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Redirecting to live bracket app...</h1>
    <p>If redirect does not start, open <a href="./docs/">the app here</a>.</p>
  </main>
  <script>
    (() => {
      const target = new URL("./docs/", window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    })();
  </script>
</body>
</html>
